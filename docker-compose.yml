services:
  app:
    build: .
    container_name: deepdalevision-app
    restart: unless-stopped
    depends_on:
      - livekit
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LIVEKIT_URL: "${LIVEKIT_URL:-auto}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevsecret}"
      MAX_VIEWERS: "${MAX_VIEWERS:-12}"

  livekit:
    image: livekit/livekit-server:v1.12.0
    container_name: deepdalevision-livekit
    restart: unless-stopped
    command:
      - --node-ip
      - "${LIVEKIT_NODE_IP:-127.0.0.1}"
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: false
        room:
          auto_create: true
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevsecret}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
